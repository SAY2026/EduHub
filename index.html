<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAY CLASS Mobile Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #1D9E75;
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text-main: #1C1E21;
            --text-sub: #606770;
            --safe-area-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            line-height: 1.4;
        }

        /* 顶部状态栏区域 */
        .app-header {
            background: var(--primary);
            color: white;
            padding: calc(20px + var(--safe-area-top)) 20px 20px;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 15px rgba(29, 158, 117, 0.15);
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .app-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .admin-badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; }

        /* 快捷统计横轴 */
        .stats-scroller {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 15px 20px; scrollbar-width: none;
        }
        .stats-scroller::-webkit-scrollbar { display: none; }
        
        .m-stat-card {
            background: white; padding: 12px 18px; border-radius: 16px;
            min-width: 100px; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .m-stat-label { font-size: 10px; color: var(--text-sub); font-weight: 600; margin-bottom: 4px; }
        .m-stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }

        /* 搜索区域 */
        .search-box { padding: 0 20px 15px; }
        .m-input {
            width: 100%; border: 1.5px solid #E4E6EB; padding: 14px 18px;
            border-radius: 14px; background: white;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .m-input:focus { border-color: var(--primary); }

        /* 教师列表列表 */
        .list-wrapper { padding: 0 20px 100px; }
        .m-card {
            background: white; border-radius: 18px; padding: 16px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .m-avatar {
            width: 52px; height: 52px; border-radius: 14px;
            background: #E1F5EE; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: 700; flex-shrink: 0;
        }

        .m-details { flex: 1; min-width: 0; }
        .m-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; color: #050505; }
        .m-subtext { font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
        .m-badges { display: flex; gap: 5px; }
        .m-tag { font-size: 9px; padding: 2px 8px; background: #F0F2F5; border-radius: 4px; font-weight: 600; color: #4B4F56; }

        .m-arrow { color: #BEC3C9; font-size: 18px; }

        /* 底部固定导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            height: 80px; display: flex; justify-content: space-around;
            padding: 10px 20px 25px; border-top: 0.5px solid #E4E6EB;
        }
        .nav-btn { text-align: center; color: #8A8D91; text-decoration: none; font-size: 10px; font-weight: 600; }
        .nav-btn.active { color: var(--primary); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="header-content">
        <div class="app-title">SAY CLASS</div>
        <div class="admin-badge">Admin: PI LI</div>
    </div>
    <div style="font-size: 11px; margin-top: 5px; opacity: 0.9;">AI Transformation Hub · Zanzibar</div>
</div>

<div class="stats-scroller">
    <div class="m-stat-card">
        <div class="m-stat-label">TEACHERS</div>
        <div class="m-stat-value">26</div>
    </div>
    <div class="m-stat-card">
        <div class="m-stat-label">SCHOOLS</div>
        <div class="m-stat-value">20</div>
    </div>
    <div class="m-stat-card">
        <div class="m-stat-label">STATUS</div>
        <div class="m-stat-value">LIVE</div>
    </div>
</div>

<div class="search-box">
    <input type="text" class="m-input" placeholder="Search name or school..." id="search" oninput="updateList()">
</div>

<div class="list-wrapper" id="teacher-list">
    </div>

<div class="bottom-nav">
    <a href="#" class="nav-btn active"><span class="nav-icon">🏫</span>Stations</a>
    <a href="#" class="nav-btn"><span class="nav-icon">📚</span>Course</a>
    <a href="#" class="nav-btn"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
    // 继承 26 位真实教师数据
    const teachers = [
        {id:1, name:'Khalid Kh Salum', school:'Kinuni Sec', sub:'ICT'},
        {id:2, name:'Khairat N. Abdalla', school:'Kinyasini Sec', sub:'ENGLISH'},
        {id:3, name:'Sabrina S. Abdalla', school:'Kwamtipura Sec', sub:'GEOGRAPHY'},
        {id:4, name:'Abed S. Abeid', school:'Kwamtipura Sec', sub:'MATH'},
        {id:5, name:'Pili A. Juma', school:'Kama Sec', sub:'MATH'},
        {id:6, name:'Ame Rashid Ame', school:'Dr John P. Magufuli', sub:'MATH'},
        {id:7, name:'Badru Khatib Khamis', school:'Abedi Amani Sec', sub:'HISTORY'},
        {id:8, name:'Rauhiya Ali Maalim', school:'Hasnu Maka Sec', sub:'KISWAHILI'},
        {id:9, name:'Iptisam Amran Masoud', school:'Nyerere Sec', sub:'ICT'},
        {id:10, name:'Haruwa Kh. Mohd', school:'Aboud Jumbe Sec', sub:'KISWAHILI'}
        // ... 此处可继续添加其余 16 位教师数据
    ];

    function updateList() {
        const q = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('teacher-list');
        
        const filtered = teachers.filter(t => 
            t.name.toLowerCase().includes(q) || t.school.toLowerCase().includes(q)
        );

        container.innerHTML = filtered.map(t => `
            <div class="m-card" onclick="alert('Opening Station: ${t.name}')">
                <div class="m-avatar">${t.name.split(' ')[0][0]}${t.name.split(' ').slice(-1)[0][0]}</div>
                <div class="m-details">
                    <div class="m-name">${t.name}</div>
                    <div class="m-subtext">${t.school}</div>
                    <div class="m-badges">
                        <span class="m-tag">${t.sub}</span>
                        <span class="m-tag" style="color:#1D9E75">VERIFIED</span>
                    </div>
                </div>
                <div class="m-arrow">›</div>
            </div>
        `).join('');
    }

    updateList();
</script>

</body>
</html>
