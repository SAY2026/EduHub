.av-purple { background: #EEEDFE; color: #3C3489; }

.av-coral { background: #FAECE7; color: #712B13; }

.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot-online { background: #1D9E75; }
.dot-pending { background: #EF9F27; }
.status-text { font-size: 11px; color: var(--color-text-secondary); }
.visit-btn { font-size: 11px; padding: 3px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }

.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 1.25rem 0 0.75rem; display: flex; align-items: center; gap: 6px; }
.count-badge { font-size: 11px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 1px 8px; border-radius: 10px; }
.note-bar { background: #FAEEDA; border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 12px; color: #633806; margin-bottom: 1rem; }
.action-bar { margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); display: flex; gap: 10px; flex-wrap: wrap; }

.action-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.action-btn.primary:hover { background: #0F6E56; }

  'CHEMISTRY':'CHEMISTRY','KISWAHILI':'KISWAHILI','CIVICS':'CIVICS'
};

let currentStatus = 'all';

function getInitials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function setStatus(s, btn) {
  currentStatus = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const subj = document.getElementById('subject-filter').value;
  const filtered = teachers.filter(t => {
    if (currentStatus === 'verified' && !t.verified) return false;
    if (currentStatus === 'pending' && t.verified) return false;
    if (search && !t.name.toLowerCase().includes(search) && !t.school.toLowerCase().includes(search)) return false;
    if (subj && !t.subjects.includes(subj)) return false;
    return true;
  });
  document.getElementById('showing-count').textContent = '显示 ' + filtered.length + ' 位';
  const grid = document.getElementById('teacher-grid');
  grid.innerHTML = filtered.map(t => {
    const initials = getInitials(t.name);
    const color = avColors[(t.id - 1) % avColors.length];
    const statusDot = t.verified ? 'dot-online' : 'dot-pending';
    const statusLabel = t.verified ? '已验证' : '待补充';
    const tags = t.subjects.map(s => `<span class="subject-tag">${s}</span>`).join('');
    return `<div class="teacher-card">
      <div class="avatar ${color}">${initials}</div>
      <div class="teacher-name" title="${t.name}">${t.id}. ${t.name}</div>
      <div class="teacher-school" title="${t.school}">${t.school}</div>
      <div class="subjects">${tags}</div>
      <div class="card-footer">
        <div><span class="status-dot ${statusDot}"></span><span class="status-text">${statusLabel}</span></div>
        ${t.verified ? `<button class="visit-btn" onclick="alert('跳转至 ${t.name} 的教育基站')">访问基站</button>` : ''}
      </div>
    </div>`;
  }).join('');
}
